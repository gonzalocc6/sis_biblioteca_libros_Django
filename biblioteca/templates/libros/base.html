<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Biblioteca Musical{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'biblioteca:libros' %}">Biblioteca Virtual</a>
            <div class="navbar-nav me-auto">
                <a class="nav-link text-white" href="{% url 'biblioteca:libros' %}">Libros</a>
                <a class="nav-link text-white" href="{% url 'biblioteca:autores' %}">Autores</a>
                <a class="nav-link text-white" href="{% url 'biblioteca:prestamos' %}">Préstamos</a>
            </div>
            <div class="navbar-nav">
                {% if user.is_authenticated %}
                    <span class="nav-item nav-link text-info">Hola, {{ user.username }}!</span>
                    <a class="nav-link btn btn-outline-danger btn-sm text-white px-2 mx-2" href="{% url 'biblioteca:logout' %}">Cerrar Sesión</a>
                {% else %}
                    <a class="nav-link text-white" href="{% url 'biblioteca:login' %}">Iniciar Sesión</a>
                    <a class="nav-link text-white" href="{% url 'biblioteca:register' %}">Registrarse</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
