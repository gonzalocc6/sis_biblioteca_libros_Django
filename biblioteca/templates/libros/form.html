{% extends 'libros/base.html' %}

{% block title %}Formulario de Libro{% endblock %}

{% block content %}
<div class="card shadow" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header bg-primary text-white">
        <h4>{% if form.instance.pk %}Editar Libro{% else %}Nuevo Libro{% endif %}</h4>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="mt-3">
                <button type="submit" class="btn btn-success">Guardar Cambios</button>
                <a href="{% url 'biblioteca:libros' %}" class="btn btn-dark">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
